<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Write a Post — Hull Hall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Georgia&display=swap" rel="stylesheet">
    <style>
        /* Makes the editing boxes bigger and easier to work in. There is
           no actual character limit on Body or Tags — the default boxes
           were just small. .CodeMirror is CodeMirror's own class name
           (used by the Body editor's Markdown tab), not something Decap
           CMS hides. */
        .CodeMirror, .CodeMirror-scroll {
            min-height: 480px !important;
        }
        textarea {
            min-height: 90px;
        }

        /* Word-like writing feel for the Body field, both tabs:
           - Markdown tab is CodeMirror
           - Rich Text tab is a contenteditable area
           Bigger serif-ish text, generous line spacing, and breathing
           room on the sides so it reads like a document, not a code box. */
        .CodeMirror,
        [contenteditable="true"] {
            font-family: Georgia, "Times New Roman", serif !important;
            font-size: 17px !important;
            line-height: 1.7 !important;
        }
        .CodeMirror {
            padding: 12px 6px;
        }
        [contenteditable="true"] {
            padding: 16px 20px !important;
            max-width: 720px;
        }
        [contenteditable="true"] p {
            margin-bottom: 14px !important;
        }
    </style>
</head>
<body>
    <!-- Pinned to a real, verified release on purpose. Decap CMS is
         updated often; letting this float (e.g. "^3.0.0") means the
         editor can silently switch to a new, sometimes buggy version
         overnight. Bump this number deliberately if you ever want to
         update — check the version exists at decapcms.org/docs/releases
         or npmjs.com/package/decap-cms first.

         This has to load here, at the end of <body>, not in <head> —
         it injects itself into the page as soon as it loads, and needs
         document.body to already exist when that happens. -->
    <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
    <script>
        // Shows the post the way it'll actually look on the live site
        // (same fonts, same colors) instead of Decap's generic default
        // preview style.
        CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap");
        CMS.registerPreviewStyle("/style.css");
    </script>
</body>
</html>
